services:
  wallet:
    build:
      context: ./wallet
    ports:
      - "${WALLET_PORT:-8000}:8000"
    environment: &wallet_environment
      DATABASE_URL: postgresql://wallet:wallet@postgres:5432/wallet
      REDIS_URL: redis://redis:6379/0
      BANK_SERVICE_URL: http://third-party:8010/
      DISPATCHER_INTERVAL_SECONDS: ${DISPATCHER_INTERVAL_SECONDS:-5}
      WITHDRAWAL_DISPATCH_BATCH_SIZE: ${WITHDRAWAL_DISPATCH_BATCH_SIZE:-50}
      WITHDRAWAL_MAX_QUEUED_AGE_SECONDS: ${WITHDRAWAL_MAX_QUEUED_AGE_SECONDS:-60}
    volumes:
      - ./wallet:/app
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py runserver 0.0.0.0:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./wallet
    environment: *wallet_environment
    volumes:
      - ./wallet:/app
    command: celery -A wallet worker --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./wallet
    environment: *wallet_environment
    volumes:
      - ./wallet:/app
    command: celery -A wallet beat --loglevel=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d wallet"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  third-party:
    build:
      context: ./third-party
    ports:
      - "${THIRD_PARTY_PORT:-8010}:8010"
    volumes:
      - ./third-party:/app
    command: python app.py

volumes:
  postgres_data:
